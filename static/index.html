<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecosystem Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 16px;
            background: #f5f7fb;
            color: #20232a;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        #controls {
            margin-bottom: 12px;
        }

        button {
            margin-right: 8px;
            padding: 8px 14px;
            border: 1px solid #888;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #f0f0f0;
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
        }

        #simCanvas {
            border: 2px solid #30363d;
            background: #ffffff;
            display: block;
        }

        #networkCanvas {
            border: 1px solid #d0d7de;
            background: #ffffff;
            display: block;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <h1>Ecosystem Web Visualization</h1>

    <div id="controls">
        <button id="toggleButton">Pause</button>
        <button id="stepButton">Step</button>
    </div>

    <canvas id="simCanvas" width="800" height="600"></canvas>
    <div id="status">Loading...</div>
    <div id="stats" style="margin-top:12px; padding:10px; border:1px solid #d0d7de; border-radius:6px; background:#ffffff; max-width:820px; font-size:13px; line-height:1.5; color:#111827;">Click a herbivore or predator to view stats.</div>
    <canvas id="networkCanvas" width="820" height="300"></canvas>

    <script src="/static/app.js"></script>
</body>
</html>
